<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-OS</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f0f0f4;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        /* Layering: WebGL volume (canvas) at the back, CSS3D windows/taskbar
           on top of it, screen-fixed HUD (legend) above everything. */
        #app {
            position: fixed;
            inset: 0;
            display: block;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* CSS3DRenderer injects this container; keep it above the canvas.
           pointer-events:none lets clicks fall through except on the
           interactive panels themselves (which re-enable pointer-events). */
        #css3d {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* First small nod to the Windows/OS look: a control legend panel. */
        #legend {
            position: fixed;
            z-index: 10;
            top: 16px;
            left: 16px;
            min-width: 220px;
            padding: 12px 14px;
            background: rgba(243, 243, 243, 0.78);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            color: #1a1a1a;
            font-size: 12.5px;
            line-height: 1.5;
            user-select: none;
            pointer-events: none;
        }

        #legend h1 {
            font-size: 13.5px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        #legend table {
            border-collapse: collapse;
        }

        #legend td {
            padding: 1px 0;
            vertical-align: top;
        }

        #legend td:first-child {
            padding-right: 12px;
            white-space: nowrap;
        }

        #legend kbd {
            display: inline-block;
            min-width: 16px;
            padding: 1px 5px;
            background: #fff;
            border: 1px solid #b8b8b8;
            border-bottom-width: 2px;
            border-radius: 4px;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 11px;
            text-align: center;
        }

        /* -------------------------------------------------------------------
           Windows-style taskbar (rendered as a CSS3DObject floating in 3D).
           These elements are real DOM, so styling lives in the page CSS.
           ------------------------------------------------------------------- */
        .taskbar {
            box-sizing: border-box;
            position: relative; /* anchor for the Start menu popover */
            width: 1100px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            cursor: grab; /* grab the bar to rotate it */
            background: rgba(32, 34, 42, 0.82);
            backdrop-filter: blur(18px) saturate(140%);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 12px;
            box-shadow: 0 14px 48px rgba(0, 0, 0, 0.45);
            color: #fff;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            user-select: none;
            pointer-events: auto;
            /* keep edges crisp when scaled in 3D */
            -webkit-font-smoothing: antialiased;
        }

        .start-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            height: 44px;
            padding: 0 16px;
            background: transparent;
            border: 0;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.10);
        }

        .start-btn:active,
        .start-btn.active {
            background: rgba(255, 255, 255, 0.18);
        }

        .win-logo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 3px;
            width: 22px;
            height: 22px;
        }

        .win-logo i {
            display: block;
            border-radius: 2px;
        }

        .win-logo i:nth-child(1) { background: #3fb0ff; }
        .win-logo i:nth-child(2) { background: #4cc2ff; }
        .win-logo i:nth-child(3) { background: #36a3f7; }
        .win-logo i:nth-child(4) { background: #2b8ef0; }

        .start-label {
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        /* flexible spacer that pushes the clock to the far right */
        .taskbar-apps {
            flex: 1 1 auto;
        }

        .taskbar-clock {
            text-align: right;
            line-height: 1.15;
            padding: 0 10px;
        }

        .clock-time {
            font-size: 15px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 12px;
            opacity: 0.85;
        }

        body.dragging .taskbar { cursor: grabbing; }

        /* -------------------------------------------------------------------
           Start menu (a popover anchored above the Start button, in the
           taskbar's own CSS3D plane so it rotates with the bar). Two columns
           — Front / Back — let you pick one app each, then Launch spawns a
           window with those two apps on its two faces.
           ------------------------------------------------------------------- */
        .start-menu {
            position: absolute;
            left: 8px;
            bottom: calc(100% + 14px);
            width: 460px;
            max-height: 480px;
            display: none;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            background: rgba(40, 42, 52, 0.92);
            backdrop-filter: blur(22px) saturate(140%);
            -webkit-backdrop-filter: blur(22px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5);
            color: #fff;
            cursor: default;
        }

        .start-menu.open {
            display: flex;
        }

        .start-columns {
            display: flex;
            gap: 10px;
        }

        .start-col {
            flex: 1 1 50%;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .start-col + .start-col {
            border-left: 1px solid rgba(255, 255, 255, 0.10);
            padding-left: 10px;
        }

        .start-col-header {
            padding: 4px 8px 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.55;
        }

        .start-col-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 360px;
            overflow: auto;
        }

        .start-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 10px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #fff;
            font-family: inherit;
            font-size: 13.5px;
            text-align: left;
            cursor: pointer;
            transition: background 0.12s ease;
        }

        .start-item:hover { background: rgba(255, 255, 255, 0.10); }
        .start-item:active { background: rgba(255, 255, 255, 0.18); }

        .start-item.selected {
            background: rgba(0, 120, 212, 0.45);
            box-shadow: inset 0 0 0 1px rgba(0, 170, 255, 0.7);
        }

        .start-item-icon {
            width: 22px;
            font-size: 18px;
            text-align: center;
        }

        .start-item-name {
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .start-launch {
            flex: 0 0 auto;
            padding: 11px 0;
            border: 0;
            border-radius: 8px;
            background: #0078d4;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2px;
            cursor: pointer;
            transition: background 0.12s ease;
        }

        .start-launch:hover:not(:disabled) { background: #1387e8; }
        .start-launch:active:not(:disabled) { background: #006bbd; }

        .start-launch:disabled {
            background: rgba(255, 255, 255, 0.10);
            color: rgba(255, 255, 255, 0.4);
            cursor: default;
        }

        /* -------------------------------------------------------------------
           Two-sided draggable windows (each face is a CSS3DObject).
           backface-visibility hides whichever face is turned away, so the two
           apps never bleed through each other.
           ------------------------------------------------------------------- */
        .win {
            box-sizing: border-box;
            position: relative;
            width: 460px;
            height: 340px;
            display: flex;
            flex-direction: column;
            background: #f3f3f3;
            border: 1px solid rgba(0, 0, 0, 0.18);
            border-radius: 10px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.42);
            overflow: hidden;
            color: #1a1a1a;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            pointer-events: auto;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* "3D window" mode: stop flattening/clipping so children with a
           translateZ (e.g. Minesweeper flags) protrude in the real camera's
           perspective. Only panes whose app sets threeD:true get this. */
        .win.win-3d,
        .win.win-3d .win-body {
            overflow: visible;
            transform-style: preserve-3d;
        }

        .win-titlebar {
            flex: 0 0 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            /* inset so the title text & buttons clear the corner handles */
            padding: 0 30px;
            background: linear-gradient(#fbfbfb, #eef0f2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            cursor: grab;
            user-select: none;
        }

        body.dragging .win-titlebar { cursor: grabbing; }

        .win-title {
            flex: 1 1 auto;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .win-cube,
        .win-close {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 26px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: #1a1a1a;
            font-size: 13px;
            cursor: pointer;
        }

        .win-cube svg {
            width: 15px;
            height: 15px;
        }

        .win-cube:hover { background: rgba(0, 120, 212, 0.15); }
        .win-cube.open { background: rgba(0, 120, 212, 0.25); }

        .win-close:hover {
            background: #e81123;
            color: #fff;
        }

        /* Cube icon's "rotate" actions dropdown. */
        .win-actions-menu {
            position: absolute;
            z-index: 5;
            top: 40px;
            left: 6px;
            width: 220px;
            display: none;
            flex-direction: column;
            padding: 6px;
            background: #fdfdfd;
            border: 1px solid rgba(0, 0, 0, 0.14);
            border-radius: 8px;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
        }

        .win-actions-menu.open { display: flex; }

        .win-action {
            padding: 9px 10px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: #1a1a1a;
            font-family: inherit;
            font-size: 12.5px;
            text-align: left;
            cursor: pointer;
        }

        .win-action:hover { background: rgba(0, 120, 212, 0.12); }
        .win-action:active { background: rgba(0, 120, 212, 0.22); }

        .win-body {
            flex: 1 1 auto;
            overflow: auto;
            background: #fff;
        }

        /* Corner rotate handles — last in the DOM so they win the hit-test
           over the title bar/body beneath them. */
        .win-corner {
            position: absolute;
            width: 24px;
            height: 24px;
            cursor: grab;
        }

        body.dragging .win-corner { cursor: grabbing; }

        .win-corner.tl { top: 0; left: 0; }
        .win-corner.tr { top: 0; right: 0; }
        .win-corner.bl { bottom: 0; left: 0; }
        .win-corner.br { bottom: 0; right: 0; }

        .win-corner::before {
            content: "";
            position: absolute;
            inset: 5px;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: border-color 0.15s ease;
        }

        .win-corner:hover::before { border-color: rgba(0, 120, 212, 0.95); }

        /* show only the two edges that form each corner bracket */
        .win-corner.tl::before { border-right: 0; border-bottom: 0; }
        .win-corner.tr::before { border-left: 0; border-bottom: 0; }
        .win-corner.bl::before { border-right: 0; border-top: 0; }
        .win-corner.br::before { border-left: 0; border-top: 0; }

        /* Prevent text selection flicker anywhere while dragging a window. */
        body.dragging,
        body.dragging * { user-select: none !important; }

        /* An iframe is a separate browsing context that would swallow the
           mousemove events a drag relies on. Disable its hit-testing only
           while dragging, so move/rotate keeps tracking over embedded apps. */
        body.dragging iframe { pointer-events: none; }

        /* --- demo app bodies --- */
        .app-notepad {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            border: 0;
            outline: none;
            resize: none;
            padding: 12px;
            font-family: Consolas, "Cascadia Mono", monospace;
            font-size: 13px;
            line-height: 1.45;
            color: #202020;
        }

        .app-about,
        .app-welcome {
            padding: 18px 20px;
            font-size: 13px;
            line-height: 1.5;
        }

        .app-about h2,
        .app-welcome h2 {
            margin: 0 0 10px;
            font-size: 19px;
        }

        .app-about ul {
            margin: 8px 0;
            padding-left: 18px;
        }

        .app-about li { margin: 3px 0; }

        .app-about .muted {
            margin-top: 14px;
            color: #808080;
            font-size: 11px;
            letter-spacing: 0.3px;
        }

        .app-clock {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: radial-gradient(circle at 50% 38%, #1b2735, #0a0c11);
            color: #fff;
        }

        .app-clock-time {
            font-size: 40px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .app-clock-date {
            font-size: 13px;
            opacity: 0.8;
        }

        .app-syspanel {
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 22px;
            text-align: center;
            background: linear-gradient(160deg, #eef3fb, #dbe5f3);
        }

        .app-syspanel h2 {
            margin: 0;
            font-size: 20px;
        }

        .app-syspanel p {
            margin: 0;
            font-size: 13px;
        }

        .app-syspanel .muted {
            color: #6a7180;
            font-size: 11px;
        }

        .syspanel-logo .win-logo {
            width: 40px;
            height: 40px;
            gap: 4px;
        }

        /* --- embedded YouTube player --- */
        .app-youtube {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }

        .yt-bar {
            flex: 0 0 auto;
            display: flex;
            gap: 6px;
            padding: 6px;
            background: #1c1c1c;
        }

        .yt-input {
            flex: 1 1 auto;
            min-width: 0;
            padding: 6px 8px;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-family: inherit;
            font-size: 12px;
            outline: none;
        }

        .yt-input::placeholder { color: #888; }
        .yt-input.yt-error { border-color: #e81123; }

        .yt-load {
            flex: 0 0 auto;
            padding: 6px 14px;
            border: 0;
            border-radius: 6px;
            background: #cc0000;
            color: #fff;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.12s ease;
        }

        .yt-load:hover { background: #e60000; }
        .yt-load:active { background: #b00000; }

        .yt-stage {
            flex: 1 1 auto;
            position: relative;
        }

        .yt-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* --- 3D Minesweeper ---
           The container chain is preserve-3d so a flagged cell's flag can
           protrude along the board normal. Generous padding keeps the board
           inset, clear of the title bar and the corner rotate-handles. */
        .app-minesweeper {
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 16px 30px 30px;
            background: #c0c0c0;
            transform-style: preserve-3d;
            font-family: "Segoe UI", system-ui, sans-serif;
            user-select: none;
        }

        .ms-header {
            flex: 0 0 auto;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            background: #c0c0c0;
            border: 3px solid;
            border-color: #7d7d7d #fff #fff #7d7d7d; /* inset bezel */
        }

        .ms-counter,
        .ms-timer {
            min-width: 52px;
            padding: 2px 4px;
            background: #000;
            color: #ff2d2d;
            font-family: "Consolas", monospace;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
        }

        .ms-reset {
            width: 34px;
            height: 34px;
            border: 3px solid;
            border-color: #fff #7d7d7d #7d7d7d #fff; /* raised bezel */
            background: #c0c0c0;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
        }

        .ms-reset:active {
            border-color: #7d7d7d #fff #fff #7d7d7d;
        }

        .ms-board {
            flex: 0 0 auto;
            display: grid;
            grid-template-columns: repeat(var(--ms-cols), 24px);
            grid-auto-rows: 24px;
            border: 3px solid;
            border-color: #7d7d7d #fff #fff #7d7d7d;
            transform-style: preserve-3d;
        }

        .ms-cell {
            position: relative;
            width: 24px;
            height: 24px;
            margin: 0;
            padding: 0;
            border: 3px solid;
            border-color: #fff #7d7d7d #7d7d7d #fff; /* raised (covered) */
            background: #c0c0c0;
            font-family: "Consolas", monospace;
            font-size: 15px;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .ms-cell.revealed {
            border: 1px solid #9a9a9a;
            background: #c8c8c8;
            cursor: default;
        }

        .ms-cell.mine { background: #c0c0c0; }
        .ms-cell.mine-hit { background: #e81123; }

        /* classic number colors */
        .ms-cell[data-n="1"] { color: #0000ff; }
        .ms-cell[data-n="2"] { color: #008100; }
        .ms-cell[data-n="3"] { color: #ff0000; }
        .ms-cell[data-n="4"] { color: #000083; }
        .ms-cell[data-n="5"] { color: #810500; }
        .ms-cell[data-n="6"] { color: #008284; }
        .ms-cell[data-n="7"] { color: #000000; }
        .ms-cell[data-n="8"] { color: #808080; }

        /* The flag that sticks up out of the board: a pole raised along the
           board normal (rotateX, anchored at its base) topped by a pennant. */
        .ms-flag {
            position: absolute;
            left: 50%;
            bottom: 4px;
            width: 0;
            height: 0;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .ms-flag-pole {
            position: absolute;
            left: -1px;
            bottom: 0;
            width: 2px;
            height: 20px;
            background: linear-gradient(#444, #111);
            transform-origin: center bottom;
            transform: rotateX(-90deg); /* stand the pole out of the board */
        }

        .ms-flag-pennant {
            position: absolute;
            left: 1px;
            bottom: 0;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 11px solid #e81123;
            transform-origin: left bottom;
            /* lift to the top of the pole, then face the viewer */
            transform: rotateX(-90deg) translateY(-9px);
        }
    </style>

    <!-- Load THREE.js (and its addons, e.g. CSS3DRenderer) from a CDN as ES modules (no build step). -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <canvas id="app"></canvas>

    <div id="legend">
        <h1>3D-OS &mdash; Navigation</h1>
        <table>
            <tr><td><kbd>W</kbd>/<kbd>S</kbd></td><td>Pitch up / down</td></tr>
            <tr><td><kbd>A</kbd>/<kbd>D</kbd></td><td>Yaw left / right</td></tr>
            <tr><td><kbd>Q</kbd>/<kbd>E</kbd></td><td>Roll left / right</td></tr>
            <tr><td><kbd>&uarr;</kbd>/<kbd>&darr;</kbd></td><td>Strafe up / down</td></tr>
            <tr><td><kbd>&larr;</kbd>/<kbd>&rarr;</kbd></td><td>Strafe left / right</td></tr>
            <tr><td><kbd>F</kbd></td><td>Fly forward</td></tr>
            <tr><td><kbd>R</kbd></td><td>Fly backward</td></tr>
        </table>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
